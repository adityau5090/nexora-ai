version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports: 
      - "5431:5432"
    volumes:
      - t3-chat_db_data:/var/lib/postgresql/data
    restart: always

  nextjs:
    build: .
    ports: 
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: sh -c "sleep 5 && npx prisma migrate deploy && npm start"
    restart: always

volumes:
  t3-chat_db_data: